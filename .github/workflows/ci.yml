name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Enable corepack
        run: corepack enable
        
      - name: Install dependencies
        run: yarn install
        
      - name: Lint API
        run: yarn workspace @lubb-writer/api lint
        
      - name: Format check
        run: yarn workspace @lubb-writer/api format:check

  build:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Enable corepack
        run: corepack enable
          
      - name: Install dependencies
        run: yarn install
        
      - name: Build API
        run: yarn workspace @lubb-writer/api build
        
      - name: Build Extension
        run: yarn workspace @lubb-writer/extension build:chrome

  docker:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: ./api
          push: false
          tags: lubb-writer:latest

